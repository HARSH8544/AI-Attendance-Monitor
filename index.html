<!DOCTYPE html>
<html>
<head>
    <title>AI Productivity Monitor</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        h1 { color: #2c3e50; }
        table { margin: auto; width: 80%; border-collapse: collapse; background: white; box-shadow: 0px 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #4CAF50; color: white; text-transform: uppercase; letter-spacing: 1px; }
        tr:hover { background-color: #f1f1f1; }
        .status { color: green; font-weight: bold; }
    </style>
</head>
<body>
    <h1>📊 Harsh's Productivity Dashboard</h1>
    <h3>Live Tracking Report</h3>
    
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Time</th>
            <th>Status</th>
        </tr>
        {% for row in logs %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td class="status">✅ Present</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
